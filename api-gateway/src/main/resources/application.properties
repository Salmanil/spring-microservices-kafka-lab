spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
spring.data.redis.host=localhost
spring.data.redis.port=6379
app.rate-limit.employee.max-requests=5
app.rate-limit.employee.window-seconds=60

spring.cloud.gateway.mvc.routes[0].id=employee-api-route
spring.cloud.gateway.mvc.routes[0].uri=lb://employee-api
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/employees/**
spring.cloud.gateway.mvc.routes[0].filters[0]=RewritePath=/api/?(?<segment>.*), /${segment}

spring.cloud.gateway.mvc.routes[1].id=notification-service-route
spring.cloud.gateway.mvc.routes[1].uri=lb://notification-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.mvc.routes[1].filters[0]=RewritePath=/api/?(?<segment>.*), /${segment}

spring.cloud.gateway.mvc.routes[2].id=employee-docs-route
spring.cloud.gateway.mvc.routes[2].uri=lb://employee-api
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/docs/employee/**
spring.cloud.gateway.mvc.routes[2].filters[0]=RewritePath=/api/docs/employee/?(?<segment>.*), /${segment}

spring.cloud.gateway.mvc.routes[3].id=notification-docs-route
spring.cloud.gateway.mvc.routes[3].uri=lb://notification-service
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/docs/notification/**
spring.cloud.gateway.mvc.routes[3].filters[0]=RewritePath=/api/docs/notification/?(?<segment>.*), /${segment}

management.endpoints.web.exposure.include=health,info,gateway
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.correlation=[%X{traceId:-},%X{spanId:-}]
