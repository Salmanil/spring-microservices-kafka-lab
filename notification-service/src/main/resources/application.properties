spring.application.name=notification-service
server.port=8082

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.listener.ack-mode=record
spring.kafka.listener.missing-topics-fatal=false
app.kafka.schema-registry-url=http://localhost:8085

app.kafka.topic.employee-events=employee-events
app.kafka.topic.error-events=employee-events-error
app.kafka.error.max-retries=3
app.kafka.error.backoff-ms=1000
app.notification.demo.default-delay-ms=4000

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
spring.kafka.listener.observation-enabled=true
logging.pattern.correlation=[%X{traceId:-},%X{spanId:-}]

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
