spring.application.name=employee-api
server.port=8081

spring.datasource.url=jdbc:sqlite:C:/Users/Salma/OneDrive/Documents/SQL_PRACTICE/practice.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Kafka setup
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.admin.auto-create=true
spring.kafka.admin.properties.bootstrap.servers=${spring.kafka.bootstrap-servers}
app.kafka.schema-registry-url=http://localhost:8085

app.kafka.topic.employee-events=employee-events
app.kafka.topic.partitions=3
app.kafka.topic.replicas=1
app.notification-service.base-url=http://notification-service
app.notification-service.slow-call-default-delay-ms=4000

logging.level.org.springframework.kafka=INFO

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.endpoint.caches.access=read_only
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true
logging.pattern.correlation=[%X{traceId:-},%X{spanId:-}]

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

resilience4j.retry.instances.notificationService.max-attempts=3
resilience4j.retry.instances.notificationService.wait-duration=1s
resilience4j.retry.instances.notificationService.retry-exceptions=java.util.concurrent.TimeoutException,org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException
resilience4j.circuitbreaker.instances.notificationService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificationService.wait-duration-in-open-state=10s
resilience4j.timelimiter.instances.notificationService.timeout-duration=2s

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.cache-null-values=false

app.security.jwt.secret=ZmFrZS1lbXBsb3llZS1hcGktand0LXNlY3JldC1mb3ItbGVhcm5pbmctb25seS0yMDI2LTAzLTI1LXNlY3VyZQ==
app.security.jwt.access-token-minutes=1440
app.security.jwt.refresh-token-days=7
app.security.jwt.issuer=employee-api
app.security.default-role=ROLE_USER

server.ssl.enabled=false
server.ssl.key-store=classpath:employee-api-keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=employee-api
app.security.https-port=8443
